apiVersion: ctlptl.dev/v1alpha1
kind: Registry
name: spec-factory-registry
port: 5006
---
apiVersion: ctlptl.dev/v1alpha1
kind: Cluster
product: k3d
registry: spec-factory-registry
name: k3d-spec-factory
k3d:
  v1alpha5Simple:
    metadata:
      name: spec-factory
    servers: 1
    agents: 0
    options:
      k3s:
        extraArgs:
          - arg: --disable=traefik
            nodeFilters:
              - server:*
