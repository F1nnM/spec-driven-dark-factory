table:
  name: evolution_steps
  schema: public
object_relationships:
  - name: revision
    using:
      foreign_key_constraint_on: revision_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - revision_id
        - step_number
        - status
        - branch_name
        - spec_commit_hash
        - review_loop_count
        - review_summary
      filter:
        revision:
          project:
            id:
              _in: X-Hasura-Project-Ids
update_permissions:
  - role: admin
    permission:
      columns:
        - status
        - review_loop_count
        - review_summary
      filter: {}
      check: null
