apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: spec-factory
servers: 1
agents: 0
ports:
  - port: 3000:3000
    nodeFilters:
      - loadbalancer
  - port: 3001:3001
    nodeFilters:
      - loadbalancer
  - port: 8080:8080
    nodeFilters:
      - loadbalancer
  - port: 5432:5432
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
