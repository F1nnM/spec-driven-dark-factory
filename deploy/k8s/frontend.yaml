apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: spec-factory-frontend
          ports:
            - containerPort: 3000
          env:
            - name: NUXT_DATABASE_URL
              value: postgres://specfactory:specfactory@postgres:5432/specfactory
            - name: NUXT_HASURA_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: spec-factory-secrets
                  key: HASURA_GRAPHQL_ADMIN_SECRET
            - name: NUXT_HASURA_INTERNAL_ENDPOINT
              value: http://hasura:8080/v1/graphql
            - name: NUXT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: spec-factory-secrets
                  key: ENCRYPTION_KEY
            - name: NUXT_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: spec-factory-secrets
                  key: GITHUB_CLIENT_ID
            - name: NUXT_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spec-factory-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: NUXT_BASE_URL
              value: http://localhost:3000
            - name: NUXT_PUBLIC_HASURA_HTTP_ENDPOINT
              value: http://localhost:8080/v1/graphql
            - name: NUXT_PUBLIC_HASURA_WS_ENDPOINT
              value: ws://localhost:8080/v1/graphql
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
