table:
  name: chat_messages
  schema: public
object_relationships:
  - name: revision
    using:
      foreign_key_constraint_on: revision_id
insert_permissions:
  - role: user
    permission:
      check:
        revision:
          project:
            id:
              _in: X-Hasura-Project-Ids
      columns:
        - revision_id
        - role
        - content
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - revision_id
        - role
        - content
        - created_at
      filter:
        revision:
          project:
            id:
              _in: X-Hasura-Project-Ids
