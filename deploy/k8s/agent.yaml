apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  labels:
    app: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      containers:
        - name: agent
          image: spec-factory-agent
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgres://specfactory:specfactory@postgres:5432/specfactory
            - name: HASURA_GRAPHQL_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: spec-factory-secrets
                  key: HASURA_GRAPHQL_ADMIN_SECRET
            - name: HASURA_ENDPOINT
              value: http://hasura:8080/v1/graphql
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spec-factory-secrets
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent
spec:
  type: ClusterIP
  selector:
    app: agent
  ports:
    - port: 3001
      targetPort: 3001
