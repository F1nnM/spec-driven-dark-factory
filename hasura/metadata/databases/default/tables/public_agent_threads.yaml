table:
  name: agent_threads
  schema: public
object_relationships:
  - name: project
    using:
      foreign_key_constraint_on: project_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - project_id
        - agent_type
        - state
        - created_at
        - updated_at
      filter:
        project:
          id:
            _in: X-Hasura-Project-Ids
