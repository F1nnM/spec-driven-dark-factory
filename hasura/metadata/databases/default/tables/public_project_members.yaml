table:
  name: project_members
  schema: public
object_relationships:
  - name: project
    using:
      foreign_key_constraint_on: project_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        project_id:
          _in: X-Hasura-Project-Ids
      columns:
        - project_id
        - user_id
select_permissions:
  - role: user
    permission:
      columns:
        - project_id
        - user_id
      filter:
        project_id:
          _in: X-Hasura-Project-Ids
delete_permissions:
  - role: user
    permission:
      filter:
        project_id:
          _in: X-Hasura-Project-Ids
