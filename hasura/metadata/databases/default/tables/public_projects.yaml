table:
  name: projects
  schema: public
array_relationships:
  - name: members
    using:
      foreign_key_constraint_on:
        column: project_id
        table:
          name: project_members
          schema: public
  - name: revisions
    using:
      foreign_key_constraint_on:
        column: project_id
        table:
          name: revisions
          schema: public
  - name: agent_threads
    using:
      foreign_key_constraint_on:
        column: project_id
        table:
          name: agent_threads
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - name
        - git_url
        - specs_path
        - current_revision
        - created_at
      filter:
        id:
          _in: X-Hasura-Project-Ids
insert_permissions:
  - role: user
    permission:
      columns:
        - name
        - git_url
        - ssh_private_key_encrypted
        - specs_path
      check:
        id:
          _in: X-Hasura-Project-Ids
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - git_url
        - ssh_private_key_encrypted
        - specs_path
      filter:
        id:
          _in: X-Hasura-Project-Ids
delete_permissions:
  - role: user
    permission:
      filter:
        id:
          _in: X-Hasura-Project-Ids
